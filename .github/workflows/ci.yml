name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rails_task_manager_demo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install libvips
        run: sudo apt-get update -qq && sudo apt-get install -y libvips

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.6
          bundler-cache: true

      - name: Set up database
        env:
          DATABASE_URL: postgres://runner:password@localhost:5432/rails_task_manager_demo_test
          RAILS_ENV: test
        run: |
          bin/rails db:create
          bin/rails db:migrate

      - name: Run tests
        env:
          DATABASE_URL: postgres://runner:password@localhost:5432/rails_task_manager_demo_test
          RAILS_ENV: test
        run: bundle exec rspec

      - name: Run linter
        run: bundle exec rubocop

      - name: Check vulnerabilities
        run: bundle exec bundler-audit

      - name: Security scan
        run: bundle exec brakeman -q
