services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rails_task_manager_demo
      POSTGRES_PASSWORD: ${RAILS_TASK_MANAGER_DEMO_DATABASE_PASSWORD}
      POSTGRES_DB: rails_task_manager_demo_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rails_task_manager_demo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USERNAME: rails_task_manager_demo
      DATABASE_PASSWORD: ${RAILS_TASK_MANAGER_DEMO_DATABASE_PASSWORD}
      FORCE_SSL: "false"
      APP_HOST: ${APP_HOST:-localhost:3000}
      REDIS_URL: redis://redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      MAILER_FROM: ${MAILER_FROM:-noreply@taskmanager.demo}
      MAILER_SENDER: ${MAILER_SENDER:-noreply@taskmanager.demo}
    # Bypass Thruster locally (no SSL). For production behind a real proxy,
    # remove this line to use the Dockerfile's default CMD (Thruster + Puma).
    command: ["./bin/rails", "server", "-b", "0.0.0.0"]
    ports:
      - "${PORT:-80}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/rails/storage

volumes:
  postgres_data:
  redis_data:
  app_storage:
